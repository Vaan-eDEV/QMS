<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Change Password
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            background:
                linear-gradient(
                    135deg,
                    #0f172a,
                    #1e293b
                );

            min-height:100vh;

            display:flex;

            align-items:center;

            justify-content:center;

            font-family:Arial,sans-serif;

        }

        .password-card{

            width:100%;

            max-width:450px;

            background:white;

            border-radius:24px;

            padding:35px;

            box-shadow:
                0 10px 40px rgba(0,0,0,0.2);

        }

        .title{

            font-weight:700;

            color:#0f172a;

        }

        .subtitle{

            color:#64748b;

            font-size:14px;

        }

        .form-control{

            border-radius:14px;

            padding:12px;

            border:1px solid #cbd5e1;

        }

        .form-control:focus{

            box-shadow:none;

            border-color:#2563eb;

        }

        .btn-save{

            background:#2563eb;

            border:none;

            border-radius:14px;

            padding:12px;

            font-weight:600;

        }

        .btn-save:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>

<div class="password-card">

    <div class="text-center mb-4">

        <h2 class="title">

            Change Password

        </h2>

        <p class="subtitle">

            Please update your password to continue

        </p>

    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label fw-semibold">

                Current Password

            </label>

            <input type="password"
                   name="old_password"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label fw-semibold">

                New Password

            </label>

            <input type="password"
                   name="new_password"
                   class="form-control"
                   required>

        </div>

        <div class="mb-4">

            <label class="form-label fw-semibold">

                Confirm Password

            </label>

            <input type="password"
                   name="confirm_password"
                   class="form-control"
                   required>

        </div>

        <button type="submit"
                class="btn btn-save w-100 text-white">

            Update Password

        </button>

    </form>

</div>

</body>

</html>
