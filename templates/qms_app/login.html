<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VAAN eQMS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 420px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.08);
        }

        .login-title {
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-control {
            height: 45px;
        }

        .login-footer {
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            color: #6c757d;
        }
    </style>

</head>

<body>

    <div class="login-container">

        <div class="card login-card">

            <div class="card-body">

                <h4 class="login-title">VAAN eQMS</h4>

                <form method="post">

                    {% csrf_token %}

                    <!-- LOGIN ERRORS -->
                    {% if form.errors %}
                    <div class="alert alert-danger">

                        {% for field in form %}
                        {% for error in field.errors %}
                        <div>{{ error }}</div>
                        {% endfor %}
                        {% endfor %}

                        {% for error in form.non_field_errors %}
                        <div>{{ error }}</div>
                        {% endfor %}

                    </div>
                    {% endif %}

                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label class="form-label">{{ form.username.label }}</label>

                        <input type="email" name="{{ form.username.name }}" value="{{ form.username.value|default:'' }}"
                            class="form-control" placeholder="Enter Email" required>

                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label">{{ form.password.label }}</label>

                        <input type="password" name="{{ form.password.name }}" class="form-control"
                            placeholder="Enter Password" required>

                    </div>

                    <button class="btn btn-primary w-100">
                        Login
                    </button>

                </form>

                <div class="login-footer mt-3">

                    eQMS Secure Access

                </div>

            </div>

        </div>

    </div>

</body>

</html>
