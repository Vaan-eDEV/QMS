<!-- scripts -->
<script src="https://cdn.jsdelivr.net/npm/tinymce@6.8.2/tinymce.min.js"></script>

<script>

// ================= CSRF =================
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

let currentPage = 0;
let pages = [];
let editorInstances = [];

window.signType = null;
window.selectedCell = null;


// ================= INIT EDITOR =================
document.querySelectorAll('.document-page').forEach((textarea, index) => {

    tinymce.init({
        target: textarea,
        height: 900,
        branding: false,
        statusbar: false,
        menubar: "file edit view insert format table help",
        promotion: false,
        toolbar_sticky: true,
        toolbar_sticky_offset: 80,
        fixed_toolbar_container: "#toolbar-container",

        plugins: `
            table lists link image media code fullscreen 
            autoresize searchreplace preview wordcount pagebreak
        `,

        toolbar: `
            undo redo | bold italic underline | fontsize |
            forecolor backcolor | alignleft aligncenter alignright alignjustify |
            bullist numlist | image link | pagebreak |
            table | fullscreen preview code
        `,
        selector: '.document-page',
        forced_root_block: false,
        content_style: `
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
            body {
                font-family: Arial;
                font-size: 14px;
                line-height: 1.5;
                width: 210mm;
                min-height: 297mm;
                margin: 0 auto;
                padding: 25mm 20mm 25mm 20mm;
                background: white;
            }

            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000; padding: 6px; }

            .page-break {
                border-top: 2px dashed #999;
                margin: 20px 0;
                page-break-after: always;
            }
            .signature-user{
                font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif !important;
                font-size: 13px;
                font-weight: 600;
                color: #111827;
            }
        `,

        setup: function(editor) {

            // ===== CLICK DETECTION =====
            editor.on('click', function(e) {

                let cell = editor.dom.getParent(e.target, "td");

                // TEXT MODE
                if(!cell){
                    window.selectedCell = null;

                    let content = editor.getContent().toLowerCase();

                    if(content.includes("process owner")) window.signType = "prepared";
                    else if(content.includes("reviewed by")) window.signType = "reviewed";
                    else if(content.includes("approved by")) window.signType = "approved";
                    else window.signType = "general";

                    return;
                }

                // ===== TABLE MODE =====
                let section = "";
                let row = cell.parentElement;
                let prev = row;
                let limit = 15;

                while(prev && limit-- > 0){

                    let text = prev.innerText.toLowerCase();

                    if(text.includes("process owner")){
                        section = "prepared";
                        break;
                    }
                    if(text.includes("reviewed by")){
                        section = "reviewed";
                        break;
                    }
                    if(text.includes("approved by")){
                        section = "approved";
                        break;
                    }

                    prev = prev.previousElementSibling;
                }

                // ===== SIGNATURE COLUMN CHECK =====
                let isSignatureColumn = false;

                let table = cell.closest("table");
                if(table){
                    let rows = table.querySelectorAll("tr");

                    rows.forEach(r => {
                        let c = r.children[cell.cellIndex];
                        if(
                            c &&
                            (
                                c.innerText.toLowerCase().includes("signature") ||
                                c.innerHTML.toLowerCase().includes("signature")
                            )
                        ){
                            isSignatureColumn = true;
                        }
                    });
                }

                if(!isSignatureColumn || !section){
                    window.signType = null;
                    window.selectedCell = null;
                    return;
                }

                window.signType = section;
                window.selectedCell = cell;
            });


            // ===== BLOCK EDIT INSIDE SIGNATURE =====
            editor.on('keydown', function(e){
                let node = editor.selection.getNode();
                if(node.closest('.signature-box')){
                    e.preventDefault();
                }
            });

            editor.on('cut paste delete', function(e){
                let node = editor.selection.getNode();
                if(node.closest('.signature-box')){
                    e.preventDefault();
                }
            });

            // ===== PREVENT DRAG =====
            editor.on('dragstart', function(e){
                if(e.target.closest('.signature-box')){
                    e.preventDefault();
                }
            });
        }

    }).then(editors => {
        editorInstances[index] = editors[0];
    });

});

pages = Array.from(document.querySelectorAll('.document-page'));


// ================= PAGE NAV =================
function showPage(index) {
    pages.forEach((page, i) => {
        page.parentElement.style.display = i === index ? 'block' : 'none';
    });

    document.getElementById('pageIndicator').textContent = "Page" + (index+1);
    currentPage = index;
}

document.getElementById('prevPage').addEventListener('click', () => {
    if (currentPage > 0) showPage(currentPage - 1);
});

document.getElementById('nextPage').addEventListener('click', () => {
    if (currentPage < pages.length - 1) showPage(currentPage + 1);
});

showPage(0);





function askPassword(callback){

    let modal = document.createElement("div");

    modal.innerHTML = `
    <div style="
        position: fixed;
        top:0; left:0; right:0; bottom:0;
        background: rgba(0,0,0,0.4);
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:9999;
    ">
        <div style="background:white; padding:20px; border-radius:10px; width:300px;">
            <h5>Enter your password</h5>

            <input type="password" id="pwdInput"
                class="form-control"
                placeholder="Password"
                style="margin-bottom:10px;" />

            <div style="text-align:right;">
                <button id="cancelBtn" class="btn btn-secondary btn-sm">Cancel</button>
                <button id="okBtn" class="btn btn-primary btn-sm">OK</button>
            </div>
        </div>
    </div>
    `;

    document.body.appendChild(modal);

    document.getElementById("okBtn").onclick = function(){
        let val = document.getElementById("pwdInput").value;
        document.body.removeChild(modal);
        callback(val);
    };

    document.getElementById("cancelBtn").onclick = function(){
        document.body.removeChild(modal);
    };
}
// ================= SIGN =================
let signBtn = document.getElementById("signBtn");
if(signBtn){
    signBtn.onclick = async function(){

    let editor = editorInstances[currentPage];

    if(!window.signType){
        alert("Click correct signature area");
        return;
    }

    askPassword(async function(pass) {
        if(!pass){
            alert("Password required");
            return;
        }    
    
    let r = await fetch("{% url 'verify_signature_password' %}", {
        method:"POST",
        headers:{
            "X-CSRFToken": document.getElementById("csrfToken").value,
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            password: pass,
            type: window.signType,
            doc_id: {{ doc.id }}
        })
    });

    let d = await r.json();

    if(d.status !== "ok"){
        alert(d.message || "Not allowed");
        return;
    }

    let localTime = new Date().toLocaleString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
    });

    // ✅ NEW: FONT LOGIC
    let fontFamily = "Arial";

    if(window.signType === "prepared"){
        fontFamily = "Georgia, serif";
    }
    else if(window.signType === "reviewed"){
        fontFamily = "'Courier New', monospace";
    }
    else if(window.signType === "approved"){
        fontFamily = "'Times New Roman', serif";
    }

    let html = `
<span class="signature-wrapper" style="width:120px;">
    <span class="signature-box mceNonEditable"
          contenteditable="false"
          draggable="false"
          style="
              user-select:none;
              position:relative;
              display:inline-block;
              padding:8px;
              font-family:${fontFamily};
          ">

        <!-- WATERMARK -->
        <img src="/static/admin/img/watermark.jpeg"
             style="
                position:absolute;
                top:50%;
                left:50%;
                transform:translate(-50%, -50%);
                width:120px;
                height:auto;
                opacity:0.48;
                pointer-events:none;
                z-index:0;
             " />

        <!-- CONTENT -->
        <span style="
            position:relative;
            z-index:1;
            display:block;
            text-align:left;
        ">
            ✔ Digitally Signed<br>
            <span style="font-size:18px; font-weight:600;">
                ${d.user}
            </span><br>
            ${localTime}<br>
            ${d.code}
        </span>

    </span>
</span>
`;

    // ===== TABLE MODE =====
    if(window.selectedCell){

        let rowText = window.selectedCell.parentElement.innerText.toLowerCase();

        if(window.signType === "prepared" && !rowText.includes("process owner")){
            alert("Allowed only in Process Owner");
            return;
        }

        if(window.signType === "reviewed" && !rowText.includes("reviewed by")){
            alert("Allowed only in Reviewed By");
            return;
        }

        if(window.signType === "approved" && !rowText.includes("approved by")){
            alert("Allowed only in Approved By");
            return;
        }

        if(
            rowText.includes("requested by") ||
            rowText.includes("department head") ||
            rowText.includes("authorized approver")
        ){
            alert("Not allowed in this row");
            return;
        }

        if(window.selectedCell.innerHTML.includes("Digitally Signed")){
            alert("Already signed here");
            return;
        }

        window.selectedCell.innerHTML = html;
        window.selectedCell.setAttribute("contenteditable", "false");
    }

    // ===== TEXT MODE =====
    else{

        if(editor.getContent().includes("signature-box")){
            alert("Only one signature allowed");
            return;
        }

        editor.insertContent(`
        <div style="display:flex; justify-content:flex-start;">
            ${html}
        </div>
        `);
    }

    window.signType = null;
    window.selectedCell = null;
});
};
}
// ================= SAVE DOCUMENT =================
document.getElementById("saveBtn").addEventListener("click", async function(){

    tinymce.triggerSave();

    let combinedHTML = editorInstances
        .map(e => e.getContent())
        .join('<div class="page-break"></div>');
    let title = document.getElementById("docTitle").value;
    console.log("SENDING:", combinedHTML); // 🔥 DEBUG

    let response = await fetch("{% url 'save_document' doc.id %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": document.getElementById("csrfToken").value
        },
        body: JSON.stringify({
            content: combinedHTML,   // ✅ MUST BE THIS
            summary: "",
            title: title,
            pdf_signatures: pdfSignatures
        })
    });

    let result = await response.json();
    console.log("RESPONSE:", result);

    if(result.status === "success"){

  
        if(result.message){
            alert(result.message);
        }

        let statusEl = document.getElementById("status");

 
        if(result.version){

            statusEl.innerText = "✔ Draft Saved";
        }

        statusEl.style.display = "inline-block";

            setTimeout(()=>{
                statusEl.style.display = "none";
            },2000);

        } else {
            alert(result.message || "Document save failed");
        }

        
        return; // 🔥 STOP here (important)

    });


// ================= LOAD PDF (FIXED) =================
let pdfSignatures = [];
let pdfLayer = document.getElementById("pdfLayer");
let pdfCanvas = document.getElementById("pdfCanvas");

if (pdfCanvas) {

    pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const url = window.location.origin + "{{ doc.original_file.url }}";

    let savedPDFSigns = {{ doc.pdf_signatures|default:"[]"|safe }};


    pdfjsLib.getDocument(url).promise
    .then(function(pdf) {
        return pdf.getPage(1);
    })
    .then(function(page) {

        let container = document.getElementById("pdfContainer");

        let viewport = page.getViewport({ scale: 1 });

        let zoom = 1.2;
        let scale = (container.clientWidth / viewport.width) * zoom;

        let scaledViewport = page.getViewport({ scale: scale });

        pdfCanvas.width = scaledViewport.width;
        pdfCanvas.height = scaledViewport.height;

        pdfCanvas.style.width = scaledViewport.width + "px";
        pdfCanvas.style.height = scaledViewport.height + "px";

        pdfLayer.style.width = scaledViewport.width + "px";
        pdfLayer.style.height = scaledViewport.height + "px";

        return page.render({
            canvasContext: pdfCanvas.getContext("2d"),
            viewport: scaledViewport
        }).promise;

    })
    .then(function() {

        // ✅ NOW CANVAS IS READY → LOAD SIGNATURES HERE
        savedPDFSigns.forEach(sig => {

            let sign = document.createElement("div");
            sign.innerHTML = sig.html;
            sign = sign.firstElementChild;

            sign.style.position = "absolute";
            sign.style.left = (sig.x * pdfCanvas.width) + "px";
            sign.style.top  = (sig.y * pdfCanvas.height) + "px";

            makeDraggable(sign);
            pdfLayer.appendChild(sign);

            pdfSignatures.push({
                x: sig.x / pdfCanvas.width,
                y: sig.y / pdfCanvas.height,
                page: 0,
                html: sig.html
            });

        });

    })
    .catch(function(error) {
        console.error("PDF ERROR:", error);
    });
}
// ================= PDF SIGNATURE FLOW =================



// 🔥 CLICK ADD SIGNATURE (PDF ONLY)
if(pdfLayer){

    document.getElementById("signBtn").addEventListener("click", function(){

        askPassword(async function(pass){

            if(!pass){
                alert("Password required");
                return;
            }

            let r = await fetch("{% url 'verify_signature_password' %}", {
                method:"POST",
                headers:{
                    "X-CSRFToken": document.getElementById("csrfToken").value,
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    password: pass,
                    type: "pdf",
                    doc_id: {{ doc.id }}
                })
            });

            let d = await r.json();

            if(d.status !== "ok"){
                alert(d.message || "Not allowed");
                return;
            }

            let localTime = new Date().toLocaleString();

            pdfSignatureHTML = `
                <div class="signature-box" style="
                    position:absolute;
                    cursor:move;
                    width:180px;
                ">
                    ✔ Signed<br>
                    <img src="/static/admin/img/watermark.jpeg"
                        style="
                            position:absolute;
                            top:50%;
                            left:50%;
                            transform:translate(-50%, -50%);
                            width:120px;
                            height:auto;
                            opacity:0.48;
                            pointer-events:none;
                            z-index:0;
                        ">
                    <b>${d.user}</b><br>
                    ${localTime}<br>
                    ${d.code}
                </div>
                `;

            pdfSigning = true;
            pdfLayer.style.pointerEvents = "auto";

            alert("Click anywhere on PDF to place signature");
        });
    });
}


// ================= PLACE SIGNATURE =================
if (pdfLayer) {

    pdfLayer.addEventListener("click", function(e){

        if(!pdfSigning) return;

        let rect = pdfCanvas.getBoundingClientRect();

        let x = (e.clientX - rect.left) / rect.width;
        let y = (e.clientY - rect.top) / rect.height;

        let sign = document.createElement("div");

        sign.innerHTML = pdfSignatureHTML;
        sign = sign.firstElementChild;

        sign.style.left = (x * pdfCanvas.width) + "px";
        sign.style.top = (y * pdfCanvas.height) + "px";

        makeDraggable(sign);   // 🔥 enable drag

        pdfLayer.appendChild(sign);

        pdfSigning = false;
        pdfLayer.style.pointerEvents = "none";
        pdfSignatures.push({
            x: x,
            y: y,
            html: pdfSignatureHTML
        });
    });
}


// ================= DRAG FUNCTION =================
function makeDraggable(el){

    let offsetX = 0, offsetY = 0, isDown = false;

    el.addEventListener("mousedown", function(e){
        isDown = true;
        offsetX = e.offsetX;
        offsetY = e.offsetY;
        el.style.cursor = "grabbing";
    });

    document.addEventListener("mousemove", function(e){
        if(!isDown) return;

        let rect = pdfCanvas.getBoundingClientRect();

        let x = (e.clientX - rect.left - offsetX) / rect.width;
        let y = (e.clientY - rect.top - offsetY) / rect.height;

        el.style.left = (x * pdfCanvas.width) + "px";
        el.style.top = (y * pdfCanvas.height) + "px";
    });

    document.addEventListener("mouseup", function(){
        if(!isDown) return;

        isDown = false;
        el.style.cursor = "move";

        let index = Array.from(pdfLayer.children).indexOf(el);

        if(pdfSignatures[index]){
            pdfSignatures[index].x = parseFloat(el.style.left) / pdfCanvas.width;
            pdfSignatures[index].y = parseFloat(el.style.top) / pdfCanvas.height;
        }
    });
}

</script>
