{% extends "base.html" %}
{% block title %}Edit Form{% endblock %}

{% block content %}

<style>
body {
    background: #f4f6f9;
    font-family: "Inter", system-ui;
}

.edit-wrapper {
    max-width: 700px;
    margin: 60px auto;
}

.card-box {
    background: #ffffff;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    padding: 30px;
}

.page-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 25px;
}

.form-label {
    font-size: 14px;
    font-weight: 500;
}

.save-btn {
    background: #2563eb;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    color: white;
    font-size: 14px;
}

.save-btn:hover {
    background: #1d4ed8;
}
</style>

<div class="edit-wrapper">

    <div class="card-box">

        <div class="page-title">
            Edit Form
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Form Name</label>
                <input type="text"
                       name="name"
                       value="{{ form.name }}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description"
                          class="form-control"
                          rows="4">{{ form.description }}</textarea>
            </div>

            <div class="d-flex justify-content-between">

                <a href="{% url 'form_list' %}" class="btn btn-light">
                    ← Back
                </a>

                <button type="submit" class="save-btn">
                    Save Changes
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
