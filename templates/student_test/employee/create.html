{% extends "base.html" %}
{% block content %}

<style>
.container-custom {
    max-width: 1300px;
    margin: auto;
}

.card-section {
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

.section-header {
    font-weight: 600;
    font-size: 16px;
    color: #0d6efd;
    margin-bottom: 15px;
    border-bottom: 1px solid #eee;
    padding-bottom: 5px;
}

.form-label {
    font-size: 13px;
    font-weight: 500;
}

.form-control {
    border-radius: 8px;
}

textarea.form-control {
    resize: none;
}

.submit-btn {
    padding: 10px 30px;
    border-radius: 8px;
}
</style>

<div class="container-custom mt-4">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold">Create Employee</h4>
    <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<!-- ================= BASIC ================= -->
<div class="card card-section p-3">
    <div class="section-header">Basic Information</div>
    <div class="row">

        <div class="col-md-3 mb-3">
            <label class="form-label">Employee ID*</label>
            <input type="text" name="emp_id" class="form-control" required>
        </div>

        <div class="col-md-3 mb-3">
            <label class="form-label">Name*</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="col-md-3 mb-3">
            <label class="form-label">User</label>
            <select name="user_id" class="form-control">
                <option value="">-- Select User --</option>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.email }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-3 mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control">
        </div>

    </div>
</div>

<!-- ================= PERSONAL ================= -->
<div class="card card-section p-3">
<div class="section-header">Personal Details</div>
<div class="row">

    <div class="col-md-3 mb-3">
        <label class="form-label">DOB</label>
        <input type="date" name="dob" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <label class="form-label">Gender</label>
        <input type="text" name="gender" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <label class="form-label">Marital Status</label>
        <input type="text" name="marital_status" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <label class="form-label">Nationality</label>
        <input type="text" name="nationality" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <label class="form-label">Blood Group</label>
        <input type="text" name="blood_group" class="form-control">
    </div>

</div>
</div>

<!-- ================= GOVT ================= -->
<div class="card card-section p-3">
<div class="section-header">Government IDs</div>
<div class="row">

    <div class="col-md-3 mb-3">
        <input type="text" name="pan_number" placeholder="PAN Number" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="aadhar_number" placeholder="Aadhar Number" class="form-control">
    </div>

    <!-- <div class="col-md-3 mb-3">
        <input type="text" name="uan_number" placeholder="UAN Number" class="form-control">
    </div> -->

    <div class="col-md-3 mb-3">
        <input type="text" name="pf_number" placeholder="PF Number" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="esi_number" placeholder="ESI Number" class="form-control">
    </div>

</div>
</div>

<!-- ================= CONTACT ================= -->
<div class="card card-section p-3">
<div class="section-header">Contact Details</div>
<div class="row">

    <div class="col-md-3 mb-3">
        <input type="text" name="mobile_number" placeholder="Mobile" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="alternate_number" placeholder="Alternate Number" class="form-control">
    </div>

</div>
</div>

<!-- ================= ADDRESS ================= -->
<div class="card card-section p-3">
<div class="section-header">Address</div>

<textarea name="current_address" class="form-control mb-2" placeholder="Current Address"></textarea>
<textarea name="permanent_address" class="form-control" placeholder="Permanent Address"></textarea>

</div>

<!-- ================= EMPLOYMENT ================= -->
<div class="card card-section p-3">
<div class="section-header">Employment</div>
<div class="row">

    <div class="col-md-3 mb-3">
        <input type="text" name="department" placeholder="Department" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="role" placeholder="Role" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="date" name="doj" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="employment_type" placeholder="Employment Type" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="work_location" placeholder="Work Location" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="shift" placeholder="Shift" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="cost_center" placeholder="Cost Center" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="reporting_manager" placeholder="Reporting Manager" class="form-control">
    </div>

</div>
</div>

<!-- ================= BANK ================= -->
<div class="card card-section p-3">
<div class="section-header">Bank Details</div>
<div class="row">

    <div class="col-md-3 mb-3">
        <input type="text" name="bank_name" placeholder="Bank Name" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="branch_name" placeholder="Branch" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="account_number" placeholder="Account Number" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="ifsc_code" placeholder="IFSC" class="form-control">
    </div>

</div>
</div>

<!-- ================= SALARY ================= -->
<div class="card card-section p-3">
<div class="section-header">Salary</div>
<div class="row">

    <div class="col-md-3 mb-3">
        <input type="text" name="pay_grade" placeholder="Pay Grade" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="number" step="0.01" name="basic_salary" placeholder="Basic Salary" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="date" name="effective_date" class="form-control">
    </div>

    <div class="col-md-3 mb-3">
        <input type="text" name="payment_cycle" placeholder="Payment Cycle" class="form-control">
    </div>

</div>
</div>

<!-- ================= EMERGENCY ================= -->
<div class="card card-section p-3">
<div class="section-header">Emergency Contact</div>

<input type="text" name="emergency_contact_name" placeholder="Name" class="form-control mb-2">
<input type="text" name="emergency_relationship" placeholder="Relationship" class="form-control mb-2">
<input type="text" name="emergency_mobile" placeholder="Mobile" class="form-control mb-2">
<textarea name="emergency_address" placeholder="Address" class="form-control"></textarea>

</div>

<!-- ================= EXTRA ================= -->
<div class="card card-section p-3">
<div class="section-header">Additional Info</div>

<textarea name="qualification" class="form-control mb-2" placeholder="Qualification"></textarea>
<textarea name="skills" class="form-control mb-2" placeholder="Skills"></textarea>
<textarea name="experience" class="form-control mb-2" placeholder="Experience"></textarea>
<textarea name="notes" class="form-control" placeholder="Notes"></textarea>

</div>

<!-- ================= CERTIFICATES ================= -->
<div class="card card-section p-3">
<div class="section-header">Certificates</div>
<input type="file" name="certificates" multiple class="form-control">
</div>

<!-- SUBMIT -->
<div class="text-end">
    <button type="submit" class="btn btn-success submit-btn">Save Employee</button>
</div>

</form>
</div>

{% endblock %}
