{% extends "base.html" %}
{% block content %}
<style>

.signature-box {
    display: inline-block;
    margin-top: 6px;
}

.signature-ui {
    position: relative;
    padding: 10px;
    background: #f8f9fb;
    
    border-radius: 8px;
    font-size: 13px;

    width: 240px;
    max-width: 100%;
    overflow: hidden;
}

/* TEXT */
.signature-title {
    font-weight: 600;
    color: #302f31;
    margin-bottom: 4px;
}

.signature-user {
    font-weight: 500;
}

.signature-time,
.signature-ref {
    font-size: 12px;
    color: #555;
}

/* WATERMARK LOGO */
.signature-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 110px;
    opacity: 0.46;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

</style>
<div class="container-fluid mt-4">

    <h3 class="fw-bold mb-3">📋 REGISTER Forms</h3>

    <!-- ================= TOP SECTION ================= -->
    <div class="row mb-3">

        <!-- LEFT -->
        <div class="col-md-4">
            <div class="card p-3 h-100 shadow-sm">
                <h5 class="mb-3">Select Register Form</h5>

                <select id="formSelect" class="form-select mb-3">
                    <option value="">-- Select Form --</option>
                    {% for f in forms %}
                        <option value="{{ f.id }}">{{ f.name }}</option>
                    {% endfor %}
                </select>

                <button onclick="openForm()" class="btn btn-success w-100">
                    Open
                </button>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="col-md-8">
            <div class="card p-3 h-100 shadow-sm">
                <h5 class="mb-3">📌 Register Records</h5>

                <!-- ✅ SCROLLABLE -->
                <div id="cardContainer"
                     class="d-flex flex-wrap gap-2"
                     style="max-height:250px; overflow-y:auto;">
                </div>
            </div>
        </div>

    </div>

    <!-- ================= BOTTOM SECTION ================= -->
    <div class="card p-3 shadow-sm" style="min-height:300px;">
        <h5 class="mb-3">📄 Data View</h5>

        <div id="dataContainer">
            <p class="text-muted">Select a record to view data...</p>
        </div>
    </div>

</div>
<!-- 🔥 COMPANY MODAL -->
<div class="modal fade" id="companyModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Enter Document Details</h5>
      </div>

      <div class="modal-body">

        <input type="text"
               id="docNameInput"
               class="form-control mb-2"
               placeholder="Document Name">

        <input type="text"
               id="docNumberInput"
               class="form-control mb-2"
               placeholder="Document Number">

        <input type="text"
               id="revisionInput"
               class="form-control"
               placeholder="Revision">

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="submitCompany()">
            Continue
        </button>
      </div>

    </div>
  </div>
</div>
<script>

// 🔥 GLOBAL VARIABLE
let selectedFormId = null;

// ================= OPEN FORM =================
function openForm() {

    let formId = document.getElementById("formSelect").value;

    if (!formId) {
        alert("Select form");
        return;
    }

    selectedFormId = formId;

    let modal = new bootstrap.Modal(document.getElementById("companyModal"));
    modal.show();
}

// ================= SUBMIT COMPANY =================
function submitCompany() {

    let docName = document.getElementById("docNameInput").value;
    let docNumber = document.getElementById("docNumberInput").value;
    let revision = document.getElementById("revisionInput").value;

    if (!docName || !docNumber || !revision) {
        alert("Fill all fields");
        return;
    }

    window.location.href =
        `/form-builder/fill/${selectedFormId}/`
        + `?company=default`   // 🔥 ADD THIS
        + `&doc_name=${encodeURIComponent(docName)}`
        + `&doc_number=${encodeURIComponent(docNumber)}`
        + `&revision=${encodeURIComponent(revision)}`;
    }

// ================= LOAD CARDS =================
function loadRegisterData() {

    let formId = document.getElementById("formSelect").value;

    let url = "/form-builder/register-data/";

    if (formId) {
        url += `?form_id=${formId}`;
    }

    fetch(url)
        .then(res => {
            if (!res.ok) {
                throw new Error("Failed to fetch register list");
            }
            return res.json();
        })
        .then(data => {

            let container = document.getElementById("cardContainer");
            let dataBox = document.getElementById("dataContainer");

            container.innerHTML = "";

            // ✅ EMPTY STATE
            if (!data || data.length === 0) {
                container.innerHTML = "<p class='text-muted'>No records</p>";
                dataBox.innerHTML = "<p class='text-muted'>No data available</p>";
                return;
            }

            data.forEach((item, index) => {

                let card = document.createElement("div");

                card.className = "card shadow-sm p-2";
                card.style.cursor = "pointer";
                card.style.minWidth = "130px";
                card.style.borderRadius = "10px";

                card.innerHTML = `
                    <div style="font-size:11px; color:#6c757d;">
                        ${item.form_name || "Form"}
                    </div>
                    <div style="font-weight:600; font-size:14px;">
                        ${item.ref_id || "No Ref"}
                    </div>
                `;

                // ✅ CLICK LOAD FULL DATA
                card.onclick = function () {

                    document.querySelectorAll("#cardContainer .card")
                        .forEach(c => c.classList.remove("bg-primary", "text-white"));

                    this.classList.add("bg-primary", "text-white");

                    // 🔥 CRITICAL FIX → CHECK ID
                    if (!item.id) {
                        dataBox.innerHTML = "<p class='text-danger'>Invalid record</p>";
                        return;
                    }

                    loadFullData(item.id);
                };

                container.appendChild(card);

                // ✅ AUTO LOAD FIRST RECORD (SAFE)
                if (index === 0 && item.id) {
                    card.classList.add("bg-primary", "text-white");
                    loadFullData(item.id);
                }
            });

        })
        .catch(err => {

            console.error("Register Load Error:", err);

            document.getElementById("cardContainer").innerHTML =
                "<p class='text-danger'>Failed to load records</p>";

            document.getElementById("dataContainer").innerHTML =
                "<p class='text-danger'>Error loading data</p>";
        });
}
// ================= LOAD DATA =================
// ================= LOAD DATA =================
function loadFullData(responseId) {

    fetch(`/form-builder/response-detail/${responseId}/`)
        .then(res => {

            if (!res.ok) {
                throw new Error("API error");
            }

            return res.json();
        })

        .then(dataList => {

            let container =
                document.getElementById(
                    "dataContainer"
                );

            let html = "";

            // =====================================
            // EMPTY
            // =====================================

            if (
                !dataList
                ||
                dataList.length === 0
            ) {

                container.innerHTML =
                    `
                    <p class="text-muted">
                        No data
                    </p>
                    `;

                return;
            }

            // =====================================
            // LATEST
            // =====================================

            let latest =
                dataList[
                    dataList.length - 1
                ];

            const docName =
                latest.doc_name
                ||
                latest.form_name;

            const docNumber =
                latest.doc_number
                ||
                "N/A";

            const revision =
                latest.revision
                ||
                "1.0";

            // =====================================
            // META
            // =====================================

            let tables_meta =
                latest.tables_meta
                || {};

            let row_headers =
                latest.row_headers
                || {};

            let table_titles =
                latest.table_titles
                || {};

            // =====================================
            // HEADER
            // =====================================

            html += `

                <div class="card mb-3 shadow-sm">

                    <div class="
                        card-header
                        d-flex
                        justify-content-between
                        align-items-center
                    ">

                        <div>

                            <strong>
                                ${docName}
                            </strong>

                            <br>

                            <small class="text-muted">

                                Doc No:
                                ${docNumber}

                                ${revision
                                    ?
                                    ` | Rev: ${revision}`
                                    :
                                    ""
                                }

                            </small>

                        </div>

                        <a href="
                            /form-builder/edit-response/${responseId}/
                        "
                           class="
                                btn
                                btn-warning
                                btn-sm
                           ">

                           ✏️ Edit

                        </a>

                    </div>

                    <div class="card-body">
            `;

            // =====================================
            // LOOP RESPONSES
            // =====================================

            dataList.forEach(res => {

                html += `

                    <div class="
                        mb-4
                        p-2
                        border
                        rounded
                    ">

                        <h6 class="
                            fw-bold
                            mb-2
                        ">

                            ${res.form_name}

                        </h6>
                `;

                let data = res.data || {};

                // =================================
                // LOOP DATA
                // =================================

                for (let key in data) {

                    let value = data[key];

                    // =============================
                    // SKIP INTERNAL
                    // =============================

                    if (
                        key.endsWith("_total")
                        ||
                        key.endsWith("_row_header_name")
                    ) {

                        continue;
                    }

                    // =============================
                    // TABLE
                    // =============================

                    if (Array.isArray(value)) {

                        // =========================
                        // TABLE TITLE
                        // =========================

                        let displayTableName =

                            table_titles[key]

                            ||

                            key;

                        html += `

                            <h6 class="
                                text-primary
                                mt-3
                            ">

                                ${displayTableName}

                            </h6>
                        `;

                        html += `

                            <table class="
                                table
                                table-bordered
                                table-sm
                                mb-2
                            ">
                        `;

                        // =========================
                        // COLUMNS
                        // =========================

                        let columns =

                            tables_meta[key]

                            ||

                            [];

                        // =========================
                        // ENSURE row_name FIRST
                        // =========================

                        if (
                            !columns.includes(
                                "row_name"
                            )
                        ) {

                            columns.unshift(
                                "row_name"
                            );
                        }

                        // =========================
                        // REMOVE _row_id
                        // =========================

                        columns = columns.filter(
                            c =>
                                c !== "_row_id"
                        );

                        // =========================
                        // HEADER
                        // =========================

                        if (columns.length > 0) {

                            html += "<tr>";

                            columns.forEach(col => {

                                let displayCol = col;

                                // ROW HEADER LABEL
                                if (
                                    col === "row_name"
                                ) {

                                    displayCol =

                                        row_headers[key]

                                        ||

                                        "Row Name";
                                }

                                html += `
                                    <th>
                                        ${displayCol}
                                    </th>
                                `;
                            });

                            html += "</tr>";
                        }

                        // =========================
                        // ROWS
                        // =========================

                        value.forEach(row => {

                            html += "<tr>";

                            columns.forEach(col => {

                                let cell =

                                    col === "row_name"

                                    ?

                                    row["row_name"]

                                    :

                                    row[col];

                                let cellValue =
                                    cell;

                                // =================
                                // SIGNATURE SUPPORT
                                // =================

                                if (
                                    typeof cell
                                    === "object"
                                    &&
                                    cell?.signed_by
                                ) {

                                    cellValue = `

                                        <div class="
                                            signature-box
                                        ">

                                            <div class="
                                                signature-ui
                                            ">

                                                <div>
                                                    ✔ Signed
                                                </div>

                                                <div>
                                                    ${cell.signed_by}
                                                </div>

                                                <img
                                                    src="/static/admin/img/watermark.jpeg"
                                                    class="signature-logo"
                                                >

                                                <div>
                                                    ${cell.signed_at || ""}
                                                </div>

                                            </div>

                                        </div>
                                    `;
                                }

                                html += `
                                    <td>
                                        ${cellValue ?? ""}
                                    </td>
                                `;
                            });

                            html += "</tr>";
                        });

                        html += "</table>";

                        // =========================
                        // TOTAL
                        // =========================

                        let totalKey =
                            `${key}_total`;

                        if (
                            data.hasOwnProperty(
                                totalKey
                            )
                        ) {

                            html += `

                                <div class="
                                    text-end
                                    fw-bold
                                    mb-3
                                ">

                                    Total:
                                    ${data[totalKey]}

                                </div>
                            `;
                        }
                    }

                    // =============================
                    // NORMAL FIELD
                    // =============================

                    else {

                        html += `

                            <div class="
                                row
                                mb-2
                            ">

                                <div class="
                                    col-md-3
                                    text-muted
                                ">

                                    ${key}

                                </div>

                                <div class="
                                    col-md-9
                                ">

                                    ${value}

                                </div>

                            </div>
                        `;
                    }
                }

                html += `
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
        })

        .catch(err => {

            console.error(
                "LoadFullData Error:",
                err
            );

            document.getElementById(
                "dataContainer"
            ).innerHTML =

                `
                <p class='text-danger'>
                    Failed to load data
                </p>
                `;
        });
}
// ================= AUTO LOAD =================
document.addEventListener("DOMContentLoaded", function () {

    let select = document.getElementById("formSelect");
    let urlParams = new URLSearchParams(window.location.search);

    let formId = urlParams.get("form_id");

    if (formId) {
        select.value = formId;
    }

    loadRegisterData();
});

</script>

{% endblock %}
