{% extends 'base.html' %}

{% block content %}

<div class="container-fluid py-4">

    <div class="card shadow-sm border-0 rounded-4">

        <!-- HEADER -->

        <div class="card-header bg-white border-0 p-4">

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <h3 class="fw-bold mb-1">
                        New Customer Feedback
                    </h3>

                    <p class="text-muted mb-0">
                        Create and manage customer feedback records
                    </p>

                </div>

                <div class="d-flex gap-2">

                    <a href="{% url 'feedback_list' %}"
                       class="btn btn-light border rounded-3 px-4">

                        Cancel

                    </a>

                    <button type="submit"
                            form="feedbackForm"
                            class="btn btn-primary rounded-3 px-4">

                        Submit

                    </button>

                </div>

            </div>

        </div>

        <!-- BODY -->

        <div class="card-body p-4">

            {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

            {% endif %}

            <form id="feedbackForm"
                  method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                <!-- GENERAL INFORMATION -->

                <div class="mb-5">

                    <div class="border-bottom pb-2 mb-4">

                        <h5 class="fw-bold text-primary">
                            1. General Information
                        </h5>

                    </div>

                    <div class="row">

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Date Received
                            </label>

                            <input type="date"
                                   name="date_received"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Received By
                            </label>

                            <input type="text"
                                   name="received_by"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Customer Name
                            </label>

                            <input type="text"
                                   name="customer_name"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Customer Contact
                            </label>

                            <input type="text"
                                   name="customer_contact"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Customer Email
                            </label>

                            <input type="email"
                                   name="customer_email"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Product Name
                            </label>

                            <input type="text"
                                   name="product_name"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Part Number
                            </label>

                            <input type="text"
                                   name="part_number"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Lot / Batch Number
                            </label>

                            <input type="text"
                                   name="lot_batch_number"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Sales Order No
                            </label>

                            <input type="text"
                                   name="sales_order_no"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Feedback Type
                            </label>

                            <select name="feedback_type"
                                    class="form-select rounded-3">

                                <option value="">
                                    Select Type
                                </option>

                                <option value="Complaint">
                                    Complaint
                                </option>

                                <option value="Suggestion">
                                    Suggestion
                                </option>

                                <option value="Appreciation">
                                    Appreciation
                                </option>

                            </select>

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Category
                            </label>

                            <input type="text"
                                   name="category"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Severity
                            </label>

                            <select name="severity"
                                    class="form-select rounded-3">

                                <option value="Low">
                                    Low
                                </option>

                                <option value="Medium">
                                    Medium
                                </option>

                                <option value="High">
                                    High
                                </option>

                                <option value="Critical">
                                    Critical
                                </option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Source of Feedback
                            </label>

                            <input type="text"
                                   name="source_of_feedback"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Reference Document
                            </label>

                            <input type="text"
                                   name="reference_document"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-12 mb-4">

                            <label class="form-label fw-semibold">
                                Description
                            </label>

                            <textarea name="description"
                                      rows="5"
                                      class="form-control rounded-3"></textarea>

                        </div>

                        <div class="col-md-12 mb-4">

                            <label class="form-label fw-semibold">
                                Attachment
                            </label>

                            <input type="file"
                                   name="attachment"
                                   class="form-control rounded-3">

                        </div>

                    </div>

                </div>

                <!-- ADDITIONAL INFORMATION -->

                <div class="mb-5">

                    <div class="border-bottom pb-2 mb-4">

                        <h5 class="fw-bold text-primary">
                            2. Additional Information
                        </h5>

                    </div>

                    <div class="row">

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Date of Occurrence
                            </label>

                            <input type="date"
                                   name="date_of_occurrence"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Location / Site
                            </label>

                            <input type="text"
                                   name="location_site"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Department
                            </label>

                            <input type="text"
                                   name="department"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Impact on Customer
                            </label>

                            <input type="text"
                                   name="impact_on_customer"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-6 mb-4">

                            <label class="form-label fw-semibold">
                                Immediate Action Taken
                            </label>

                            <textarea name="immediate_action_taken"
                                      rows="3"
                                      class="form-control rounded-3"></textarea>

                        </div>

                    </div>

                </div>

                <!-- INTERNAL USE -->

                <div class="mb-4">

                    <div class="border-bottom pb-2 mb-4">

                        <h5 class="fw-bold text-primary">
                            3. Internal Use
                        </h5>

                    </div>

                    <div class="row">

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Priority
                            </label>

                            <select name="priority"
                                    class="form-select rounded-3">

                                <option value="Low">
                                    Low
                                </option>

                                <option value="Medium">
                                    Medium
                                </option>

                                <option value="High">
                                    High
                                </option>

                                <option value="Urgent">
                                    Urgent
                                </option>

                            </select>

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Assigned To
                            </label>

                            <input type="text"
                                   name="assigned_to"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-4 mb-4">

                            <label class="form-label fw-semibold">
                                Target Investigation Date
                            </label>

                            <input type="date"
                                   name="target_investigation_date"
                                   class="form-control rounded-3">

                        </div>

                        <div class="col-md-12 mb-4">

                            <label class="form-label fw-semibold">
                                Remarks
                            </label>

                            <textarea name="remarks"
                                      rows="4"
                                      class="form-control rounded-3"></textarea>

                        </div>

                        <div class="col-md-12">

                            <div class="form-check">

                                <input type="checkbox"
                                       name="notify_users"
                                       class="form-check-input"
                                       id="notify_users">

                                <label class="form-check-label"
                                       for="notify_users">

                                    Notify relevant users about this feedback

                                </label>

                            </div>

                        </div>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
