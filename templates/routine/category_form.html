{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow-sm">

        <div class="card-header">
            <h5>Create Category</h5>
        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Category Name
                    </label>

                    <input
                        type="text"
                        name="category_name"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea
                        name="description"
                        class="form-control"
                        rows="4"></textarea>

                </div>

                <div class="form-check mb-3">

                    <input
                        type="checkbox"
                        name="is_active"
                        class="form-check-input"
                        checked>

                    <label class="form-check-label">

                        Active

                    </label>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Category

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
