{% extends "base.html" %}
{% block content %}

<div class="container-fluid mt-4">

    <div class="card shadow-sm border-0">

        <div class="card-header bg-white">
            <h4 class="mb-0">
                Purchase Order Inward
            </h4>
        </div>

        <div class="card-body">

            <div class="row mb-4">

                <div class="col-md-6">

                    <label class="form-label">
                        Purchase Order Number
                    </label>

                    <div class="input-group">

                        <input
                            type="text"
                            id="po_number"
                            class="form-control"
                            placeholder="Enter PO Number (Example: PO0001)"
                        >

                        <button
                            class="btn btn-primary"
                            onclick="loadPO()"
                        >
                            Load PO
                        </button>

                    </div>

                </div>

            </div>

            <div id="supplierInfo"></div>
            <div class="card mb-3">
    <div class="card-header">
        Goods Receiving Photo
    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-6">

                <video
                    id="camera"
                    autoplay
                    playsinline
                    class="border rounded w-100"
                    style="height:300px;"
                ></video>

            </div>

            <div class="col-md-6 text-center">

                <canvas
                    id="canvas"
                    style="display:none;"
                ></canvas>

                <img
                    id="preview"
                    class="img-fluid border rounded"
                    style="max-height:300px;"
                >

            </div>

        </div>

        <div class="mt-3">

            <button
                type="button"
                class="btn btn-primary"
                onclick="capturePhoto()"
            >
                Capture
            </button>

            <button
                type="button"
                class="btn btn-warning"
                onclick="retakePhoto()"
            >
                Recapture
            </button>

        </div>

    </div>

</div>
            <div class="table-responsive">

                <table
                    class="table table-bordered align-middle"
                    id="poTable"
                >

                    <thead class="table-light">

                        <tr>
    <th>Code</th>
    <th>Product</th>
    <th>Category</th>
    <th>Ordered</th>
    <th>Received</th>
    <th>Balance</th>
    <th>Rate</th>
    <th>Receive Now</th>
</tr>

                    </thead>

                    <tbody></tbody>

                </table>

            </div>

            <div class="text-end">

                <button
                    class="btn btn-success"
                    onclick="saveInward()"
                >
                    Inward Stock
                </button>

            </div>

        </div>

    </div>

</div>

<script>

let currentPO = null;
let capturedImage = "";

// =====================================================
// CAMERA START
// =====================================================

const video = document.getElementById("camera");

if (video) {

    navigator.mediaDevices
        .getUserMedia({
            video: true
        })
        .then(stream => {

            video.srcObject = stream;

        })
        .catch(error => {

            console.error(
                "Camera Error:",
                error
            );

        });
}

function capturePhoto() {

    const canvas =
        document.getElementById(
            "canvas"
        );

    canvas.width =
        video.videoWidth;

    canvas.height =
        video.videoHeight;

    const ctx =
        canvas.getContext(
            "2d"
        );

    ctx.drawImage(
        video,
        0,
        0
    );

    capturedImage =
        canvas.toDataURL(
            "image/jpeg"
        );

    document.getElementById(
        "preview"
    ).src = capturedImage;

}

function retakePhoto() {

    capturedImage = "";

    document.getElementById(
        "preview"
    ).src = "";

}

// =====================================================
// LOAD PO
// =====================================================
// =====================================================
// LOAD PO
// =====================================================
function loadPO() {

    const poNumber = document
        .getElementById("po_number")
        .value
        .trim();

    if (!poNumber) {

        alert("Enter PO Number");

        return;
    }

    fetch(
        `/goods/get-po-items/?po_number=${poNumber}`
    )

    .then(response => response.json())

    .then(data => {

        if (data.status !== "success") {

            alert(data.message);

            return;
        }

        currentPO = data.po_id;

        document.getElementById(
            "supplierInfo"
        ).innerHTML = `

            <div class="alert alert-info">

                <strong>PO :</strong>
                ${data.po_number}

                <br>

                <strong>Supplier :</strong>
                ${data.supplier}

                <br>

                <strong>Status :</strong>
                ${data.po_status}

            </div>

        `;

        const tbody =
            document.querySelector(
                "#poTable tbody"
            );

        tbody.innerHTML = "";

        data.items.forEach(item => {

            const row = `

                <tr>

                    <td>
                        ${item.code}
                    </td>

                    <td>
                        ${item.product}
                    </td>

                    <td>

                        <div class="input-group">

                            <select
                                class="form-select categorySelect"
                                data-itemid="${item.item_id}"
                            >

                                <option value="">
                                    Select Category
                                </option>

                            </select>

                            <button
                                type="button"
                                class="btn btn-outline-primary"
                                onclick="openCategoryModal()"
                            >
                                +
                            </button>

                        </div>

                    </td>

                    <td>
                        ${item.ordered_qty}
                    </td>

                    <td>
                        ${item.received_qty}
                    </td>

                    <td>

                        <span class="badge bg-warning text-dark">

                            ${item.balance_qty}

                        </span>

                    </td>

                    <td>
                        ${item.rate}
                    </td>

                    <td>

                        <input
                            type="number"
                            class="form-control receivedQty"

                            value="${item.balance_qty}"

                            min="0"

                            max="${item.balance_qty}"

                            step="0.01"

                            data-itemid="${item.item_id}"

                            data-code="${item.code}"

                            data-product="${item.product}"

                            data-rate="${item.rate}"

                            data-balance="${item.balance_qty}"
                        >

                    </td>

                </tr>

            `;

            tbody.insertAdjacentHTML(
                "beforeend",
                row
            );

        });

        loadCategories();

    })

    .catch(error => {

        console.error(error);

        alert(
            "Unable to load PO"
        );

    });

}
// =====================================================
// SAVE INWARD
// =====================================================

function saveInward() {

    if (!currentPO) {

        alert("Load a PO first");

        return;
    }

    if (!capturedImage) {

        alert("Please capture receiving photo");

        return;
    }

    let items = [];

    let hasQty = false;

    document
        .querySelectorAll(".receivedQty")
        .forEach(row => {

            const qty = parseFloat(
                row.value || 0
            );

            const balance = parseFloat(
                row.dataset.balance || 0
            );

            if (qty > balance) {

                alert(
                    `Cannot receive more than balance quantity (${balance})`
                );

                throw new Error(
                    "Invalid quantity"
                );
            }

            if (qty > 0) {

                hasQty = true;
            }

            const categorySelect =
                row.closest("tr")
                   .querySelector(
                       ".categorySelect"
                   );
            if (!categorySelect.value) {

                alert(
                    "Please select category for all products"
                );

                throw new Error(
                    "Category missing"
                );
            }
            items.push({

                item_id:
                    row.dataset.itemid,

                category_id:
                    categorySelect
                        ? categorySelect.value
                        : "",

                code:
                    row.dataset.code,

                product:
                    row.dataset.product,

                rate:
                    row.dataset.rate,

                balance_qty:
                    balance,

                received_qty:
                    qty

            });

        });

    if (!hasQty) {

        alert(
            "Enter received quantity"
        );

        return;
    }

    fetch(
        "/goods/inward-po/",
        {
            method: "POST",

            headers: {

                "Content-Type":
                    "application/json",

                "X-CSRFToken":
                    "{{ csrf_token }}"

            },

            body: JSON.stringify({

                po_id:
                    currentPO,

                image:
                    capturedImage,

                items:
                    items

            })

        }
    )

    .then(response => response.json())

    .then(data => {

        if (
            data.status === "success"
        ) {

            alert(
                "Inventory Updated Successfully\n\n" +
                "Batch : " +
                data.batch_id
            );

            loadPO();

        } else {

            alert(
                data.message
            );

        }

    })

    .catch(error => {

        console.error(error);

        alert(
            "Error saving inward entry"
        );

    });

}


// =====================================================
// OPEN CATEGORY MODAL
// =====================================================

function openCategoryModal() {

    const modal = new bootstrap.Modal(
        document.getElementById(
            "categoryModal"
        )
    );

    modal.show();

}


// =====================================================
// SAVE CATEGORY
// =====================================================

function saveCategory() {

    const name = document
        .getElementById(
            "categoryName"
        )
        .value
        .trim();

    if (!name) {

        alert(
            "Enter category name"
        );

        return;
    }

    fetch(
        "/goods/create-category/",
        {
            method: "POST",

            headers: {

                "Content-Type":
                    "application/json",

                "X-CSRFToken":
                    "{{ csrf_token }}"

            },

            body: JSON.stringify({
                name: name
            })

        }
    )

    .then(response => response.json())

    .then(data => {

        if (
            data.status === "success"
        ) {

            document.getElementById(
                "categoryName"
            ).value = "";

            loadCategories();

            bootstrap.Modal
                .getInstance(
                    document.getElementById(
                        "categoryModal"
                    )
                )
                .hide();

        } else {

            alert(
                data.message ||
                "Unable to create category"
            );

        }

    })

    .catch(error => {

        console.error(error);

        alert(
            "Error creating category"
        );

    });

}


// =====================================================
// LOAD CATEGORIES
// =====================================================

function loadCategories() {

    fetch(
        "/goods/get-categories/"
    )

    .then(response => response.json())

    .then(data => {

        document
            .querySelectorAll(
                ".categorySelect"
            )
            .forEach(select => {

                const selectedValue =
                    select.value;

                select.innerHTML =
                    '<option value="">Select Category</option>';

                data.forEach(cat => {

                    select.insertAdjacentHTML(
                        "beforeend",
                        `
                        <option value="${cat.id}">
                            ${cat.name}
                        </option>
                        `
                    );

                });

                select.value =
                    selectedValue;

            });

    })

    .catch(error => {

        console.error(
            "Category Load Error:",
            error
        );

    });

}
</script>
<div class="modal fade"
     id="categoryModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

    <h5 class="modal-title">
        Create Category
    </h5>

    <button
        type="button"
        class="btn-close"
        data-bs-dismiss="modal">
    </button>

</div>

            <div class="modal-body">

                <input
                    type="text"
                    id="categoryName"
                    class="form-control"
                    placeholder="Category Name">

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-success"
                    onclick="saveCategory()">

                    Save

                </button>

            </div>

        </div>

    </div>

</div>
{% endblock %}
