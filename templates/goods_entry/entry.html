{% extends "base.html" %}
{% block content %}

<style>
    body {
        background-color: #f5f7fa;
    }

    .custom-card {
        border: none;
        border-radius: 10px;
        background: #ffffff;
    }

    .section-title {
        font-size: 14px;
        font-weight: 600;
        color: #444;
        letter-spacing: 0.3px;
    }

    .soft-table thead {
        background-color: #f1f3f6;
    }

    .soft-table th {
        font-size: 12px;
        font-weight: 600;
        color: #555;
    }

    .soft-table td {
        font-size: 12px;
    }

    .scroll-box {
        flex: 1;
        overflow-y: auto;
        border: 1px solid #e6e9ef;
        border-radius: 6px;
    }

    .live-scroll {
        max-height: 340px;
        overflow-y: auto;
        border: 1px solid #e6e9ef;
        border-radius: 6px;
    }

    .btn-primary {
        background-color: #5fc7da;
        border: none;
    }

    .btn-primary:hover {
        background-color: #4fb7ca;
    }

    .btn-outline-secondary {
        border-color: #cfd6e4;
        color: #555;
    }

    .btn-outline-secondary:hover {
        background-color: #eef2ff;
    }

    /* =======================================
       TABLET RESPONSIVE (768px - 1024px)
    ======================================= */
    @media (max-width: 1024px) {

        .container-fluid {
            padding-left: 15px;
            padding-right: 15px;
        }

        .section-title {
            font-size: 13px;
        }

        .soft-table th,
        .soft-table td {
            font-size: 11px;
        }

        .live-scroll {
            max-height: 300px;
        }

        .scroll-box {
            max-height: 220px;
        }

        video,
        #preview {
            height: 250px !important;
        }
    }

    /* =======================================
       MOBILE RESPONSIVE (Below 768px)
    ======================================= */
    @media (max-width: 768px) {

        .container-fluid {
            padding: 10px;
        }

        /* Stack layout */
        .row {
            display: block;
        }

        .col-md-8,
        .col-md-4 {
            width: 100%;
            max-width: 100%;
        }

        .custom-card {
            margin-bottom: 15px;
        }

        /* Reduce fixed height for mobile */
        .custom-card[style] {
            height: auto !important;
        }

        .scroll-box {
            max-height: 180px;
        }

        .live-scroll {
            max-height: 250px;
        }

        /* Smaller input spacing */
        .form-control-sm {
            font-size: 13px;
            padding: 6px 8px;
        }

        /* Buttons spacing */
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* Camera full width */
        video,
        #preview {
            height: 220px !important;
        }

        /* Table scroll for mobile */
        .live-scroll,
        .scroll-box {
            overflow-x: auto;
        }

        table {
            min-width: 600px;
        }
    }

</style>

<div class="container-fluid mt-3">

    <!-- ================= TOP SECTION ================= -->
    <div class="row mb-3">

        <!-- LEFT SECTION -->
        <div class="col-md-8">

            <div class="card custom-card shadow-sm" style="height:430px;">

                <div class="card-body d-flex flex-column h-100">

                    <div class="section-title mb-2">Batch Details</div>

                    <!-- Batch Fields -->
                    <div>
                        <div class="row mb-2">
                            <!-- <div class="col-md-4">
                                <input type="text" id="batch_id"
                                       class="form-control form-control-sm"
                                       placeholder="Batch ID">
                            </div> -->
                          
                            <div class="col-md-4">
                                <input type="text" id="from"
                                       class="form-control form-control-sm"
                                       placeholder="From">
                            </div>
                            <div class="col-md-4">
                                <input type="text" id="to"
                                       class="form-control form-control-sm"
                                       placeholder="To">
                            </div>
                            <div class="col-md-4">
                                <input type="text" id="transporter"
                                       class="form-control form-control-sm"
                                       placeholder="Transporter">
                            </div>
                        </div>

                        <div class="row mb-2">
                            
                            <div class="col-md-4">
                                <input type="date" id="date"
                                       class="form-control form-control-sm">
                            </div>
                            <div class="col-md-4">
                                <input type="time" id="time"
                                       class="form-control form-control-sm">
                            </div>
                            <div class="col-md-4">
                                <input type="text" id="batch_id"
                                       class="form-control form-control-sm"
                                       placeholder="Note">
                            </div>
                        </div>
                        
                    </div>

                    <hr class="my-2">

                    <div class="section-title mb-2">Product List</div>

                    <!-- Scrollable Product Area -->
                    <div class="scroll-box">

                        <table class="table table-sm align-middle mb-0 soft-table"
                               id="productTable">

                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th width="90">Qty</th>
                                    <th width="110">Price</th>
                                    <th width="70">Action</th>
                                </tr>
                            </thead>

                            <tbody></tbody>

                        </table>

                    </div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-between mt-2">
                        <button class="btn btn-sm btn-outline-secondary"
                                onclick="addRow()">
                            + Add
                        </button>

                        <button class="btn btn-sm btn-primary"
                                onclick="saveEntry()">
                            Save
                        </button>
                    </div>

                </div>
            </div>

        </div>


        <!-- RIGHT CAMERA SECTION -->
        <div class="col-md-4">

            <div class="card custom-card shadow-sm" style="height:430px;">

                <div class="card-body d-flex flex-column justify-content-between h-100">

                    <!-- Fixed Camera Frame -->
                    <div style="height:300px; position:relative; border-radius:8px; overflow:hidden; background:#f0f2f5;">

                        <video id="video"
                               autoplay
                               style="width:100%; height:100%; object-fit:cover; position:absolute;">
                        </video>

                        <canvas id="canvas" style="display:none;"></canvas>

                        <img id="preview"
                             src=""
                             style="width:100%; height:100%; object-fit:cover; position:absolute; display:none;" />

                    </div>

                    <!-- Buttons -->
                    <div class="text-center mt-3">

                        <button class="btn btn-sm btn-primary"
                                onclick="captureImage()"
                                id="captureBtn">
                            Capture
                        </button>

                        <button class="btn btn-sm btn-warning"
                                onclick="recaptureImage()"
                                id="recaptureBtn"
                                style="display:none;">
                            Recapture
                        </button>

                    </div>

                </div>
            </div>

        </div>

    </div>



    <!-- ================= BOTTOM LIVE LIST ================= -->
    <div class="card custom-card shadow-sm">
        <div class="card-body p-3">

            <div class="section-title mb-2">Recent Entries</div>

            <div class="live-scroll">

                <table class="table table-sm align-middle mb-0 soft-table" id="liveTable">
                    <thead>
                        <tr>
                            <th>Batch</th>
                            <th>From</th>
                            <th>To</th>
                            <th>Transporter</th>
                            <th>Items</th>
                            <th>Image</th>
                            <th>Status</th>
                            <th>Confirmed Info</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

            </div>

        </div>
    </div>

</div>



<!-- ================= IMAGE POPUP MODAL ================= -->
<div class="modal fade" id="imageModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h6 class="modal-title">Batch Image</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img id="modalImage" src="" class="img-fluid rounded">
      </div>

    </div>
  </div>
</div>


<script>

// ================= CAMERA SETUP =================
const video = document.getElementById('video');
const preview = document.getElementById('preview');
const captureBtn = document.getElementById('captureBtn');
const recaptureBtn = document.getElementById('recaptureBtn');
const canvas = document.getElementById('canvas');

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(err => console.log("Camera error:", err));


// ================= CAMERA FUNCTIONS =================
function captureImage() {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext('2d').drawImage(video, 0, 0);

    preview.src = canvas.toDataURL('image/png');
    preview.style.display = "block";
    video.style.visibility = "hidden";

    captureBtn.style.display = "none";
    recaptureBtn.style.display = "inline-block";
}

function recaptureImage() {

    preview.src = "";
    preview.style.display = "none";
    video.style.visibility = "visible";

    captureBtn.style.display = "inline-block";
    recaptureBtn.style.display = "none";
}


// ================= INITIALIZE FORM =================
function initializeForm() {

    const now = new Date();

    document.getElementById("date").value =
        now.toISOString().slice(0, 10);

    document.getElementById("time").value =
        now.toTimeString().slice(0, 5);

    document.getElementById("from").value = "";
    document.getElementById("to").value = "";
    document.getElementById("transporter").value = "";

    document.getElementById("batch_id").value = "";   // backend will generate

    document.querySelector("#productTable tbody").innerHTML = "";
    addRow();

    recaptureImage();
}


// ================= ADD PRODUCT ROW =================
function addRow() {

    const table = document.querySelector("#productTable tbody");

    table.insertAdjacentHTML("beforeend", `
        <tr>
            <td><input type="text" class="form-control form-control-sm product"></td>
            <td><input type="number" class="form-control form-control-sm qty" min="1"></td>
            <td><input type="number" class="form-control form-control-sm price" min="0"></td>
            <td>
                <button class="btn btn-sm btn-outline-danger"
                        onclick="this.closest('tr').remove()">X</button>
            </td>
        </tr>
    `);
}


// ================= SAVE ENTRY =================
function saveEntry() {

    let items = [];

    document.querySelectorAll("#productTable tbody tr").forEach(row => {

        const product = row.querySelector(".product").value.trim();
        const qty = row.querySelector(".qty").value;
        const price = row.querySelector(".price").value;

        if (product) {
            items.push({
                product: product,
                qty: qty,
                price: price
            });
        }
    });

    if (items.length === 0) {
        alert("Please add at least one product.");
        return;
    }

    const payload = {
        from: document.getElementById("from").value,
        to: document.getElementById("to").value,
        transporter: document.getElementById("transporter").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        items: items
    };

    // only send image if captured
    if (preview.src && preview.style.display !== "none") {
        payload.image = preview.src;
    }

    fetch("{% url 'save_goods_entry' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {

            loadLiveData();
            initializeForm();

        } else {
            alert(data.message || "Something went wrong");
        }

    })
    .catch(error => {
        console.error("Error:", error);
        alert("Server error occurred.");
    });
}


// ================= LOAD LIVE DATA =================
function loadLiveData() {

    fetch("{% url 'goods_api' %}")
    .then(res => res.json())
    .then(data => {

        const table = document.querySelector("#liveTable tbody");
        table.innerHTML = "";

        data.forEach(row => {

            table.innerHTML += `
            <tr>
                <td>${row.batch_id}</td>
                <td>${row.from}</td>
                <td>${row.to}</td>
                <td>${row.transporter || '-'}</td>
                <td>${row.total_items}</td>
                <td>
                    ${row.image 
                        ? `<img src="${row.image}" width="50"
                        style="cursor:pointer"
                        onclick="showImage('${row.image}')"/>`
                    : '-'}
                </td>

                <td>
                    ${row.status === "Confirmed" 
                        ? `<span class="badge bg-success">Confirmed</span>`
                        : `<span class="badge bg-warning text-dark">Pending</span>`}
                </td>
                <td>
                    ${row.confirmed_by 
                        ? row.confirmed_by + "<br>" + row.confirmed_at 
                        : "-"}
                </td>



                
            </tr>
        `;

        });

    })
    .catch(err => console.log("API Error:", err));
}


// ================= IMAGE MODAL =================
function showImage(src) {
    document.getElementById("modalImage").src = src;
    new bootstrap.Modal(document.getElementById('imageModal')).show();
}


// ================= AUTO LOAD =================
window.onload = function() {
    initializeForm();
    loadLiveData();
};

setInterval(loadLiveData, 5000);

</script>


{% endblock %}
